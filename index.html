    <script>
      // Global error recovery for PWA chunk loading and script errors
      (function() {
        window.addEventListener('error', function(event) {
          var errorMsg = event.message || '';
          var errorSrc = (event.error && event.error.message) || '';
          var target = event.target || {};
          
          var isChunkError = 
            /failed to fetch dynamically imported module/i.test(errorMsg) ||
            /failed to fetch dynamically imported module/i.test(errorSrc) ||
            /chunk load failed/i.test(errorMsg) ||
            /chunk load failed/i.test(errorSrc) ||
            /error loading dynamically imported module/i.test(errorMsg) ||
            /error loading dynamically imported module/i.test(errorSrc) ||
            (target.tagName === 'SCRIPT' && target.src && (target.src.indexOf('/src/') !== -1 || target.src.indexOf('/assets/') !== -1));
            
          if (isChunkError) {
            console.warn('[Global Recovery] Chunk/Script loading failure detected. Reloading application...');
            
            // Limit reload loops to prevent infinite loops if offline or server error
            var reloadKey = 'pwa_chunk_error_reload_count';
            var reloadCount = parseInt(sessionStorage.getItem(reloadKey) || '0', 10);
            if (reloadCount < 3) {
              sessionStorage.setItem(reloadKey, (reloadCount + 1).toString());
              window.location.reload();
            } else {
              console.error('[Global Recovery] Reload loop prevented. Please check your network connection.');
            }
          }
        }, true); // Use capture phase to catch script resource load failures

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason || {};
          var errorMsg = reason.message || '';
          var isChunkError = 
            /failed to fetch dynamically imported module/i.test(errorMsg) ||
            /chunk load failed/i.test(errorMsg) ||
            /error loading dynamically imported module/i.test(errorMsg);
            
          if (isChunkError) {
            console.warn('[Global Recovery] Unhandled rejection chunk error detected. Reloading...');
            var reloadKey = 'pwa_chunk_error_reload_count';
            var reloadCount = parseInt(sessionStorage.getItem(reloadKey) || '0', 10);
            if (reloadCount < 3) {
              sessionStorage.setItem(reloadKey, (reloadCount + 1).toString());
              window.location.reload();
            }
          }
        });

        // Reset reload count on successful application mount/execution
        window.addEventListener('DOMContentLoaded', function() {
          setTimeout(function() {
            sessionStorage.removeItem('pwa_chunk_error_reload_count');
          }, 5000);
        });
      })();
    </script>
