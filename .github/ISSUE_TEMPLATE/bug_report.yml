name: 🐛 Bug Report
description: Reportar um problema no projeto
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição do bug
      description: Descreva o problema de forma clara.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Vá para '...'
        2. Clique em '...'
        3. Veja o erro
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Ambiente
      placeholder: "Windows 11 / Chrome 130 / Node 20"
