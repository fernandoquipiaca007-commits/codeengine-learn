name: ✨ Feature Request
description: Sugerir uma nova funcionalidade
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Qual problema esta feature resolve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solução proposta
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
