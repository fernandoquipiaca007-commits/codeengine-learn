name: Commit Lint

on:
  pull_request:
    branches: [main, develop]

jobs:
  commit-lint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Conventional Commits in PR
        run: |
          set -e
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9 ,_/.-]+\))?!?:[[:space:]].+'
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FAILED=0
          while IFS= read -r SUBJECT; do
            if [[ -z "$SUBJECT" ]]; then continue; fi
            if [[ "$SUBJECT" =~ ^Merge ]]; then continue; fi
            if ! [[ "$SUBJECT" =~ $PATTERN ]]; then
              echo "::error::Invalid commit message: $SUBJECT"
              echo "  → Expected format: <type>(<scope>): <description>"
              echo "  → Allowed types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
              FAILED=1
            fi
          done < <(git log --format=%s "$BASE_SHA".."$HEAD_SHA")
          if [[ $FAILED -eq 1 ]]; then exit 1; fi
          echo "✅ All commit messages follow Conventional Commits."
